# ── Deployment e Service: Blue ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blue
  template:
    metadata:
      labels:
        app: blue
    spec:
      containers:
        - name: blue
          image: fabricioveronez/web-color:blue
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blue
spec:
  selector:
    app: blue
  ports:
    - port: 80
      targetPort: 80
---
# ── Deployment e Service: Green ──
apiVersion: apps/v1
kind: Deployment
metadata:
  name: green
spec:
  replicas: 1
  selector:
    matchLabels:
      app: green
  template:
    metadata:
      labels:
        app: green
    spec:
      containers:
        - name: green
          image: fabricioveronez/web-color:green
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: green
spec:
  selector:
    app: green
  ports:
    - port: 80
      targetPort: 80

---
# ── GatewayClass: registra o NGINX ──
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: nginx
spec:
  controllerName: gateway.nginx.org/nginx-gateway-controller
---
# ── Gateway: escuta na porta 80 ──
# Na nuvem não precisamos definir NodePort.
# O LoadBalancer do Azure entrega o tráfego direto na porta 80.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: http-subdomains
      protocol: HTTP
      port: 80
      hostname: "*.danferreira.vip"   # blue.danferreira.vip, green.danferreira.vip
    - name: http-root
      protocol: HTTP
      port: 80
      hostname: "danferreira.vip"  
---
# ── HTTPRoute: /blue → service blue ──
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blue-path-route
spec:
  parentRefs:
    - name: main-gateway
      sectionName: http-root      # <-- aponta para o listener do domínio raiz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /blue
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: blue
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: green-path-route
spec:
  parentRefs:
    - name: main-gateway
      sectionName: http-root      # <-- aponta para o listener do domínio raiz
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /green
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: green
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blue-host-route
spec:
  parentRefs:
    - name: main-gateway
  hostnames:
    - "blue.danferreira.vip"
  rules:
    - backendRefs:
        - name: blue
          port: 80
---
# ── HTTPRoute: green.danferreira.vip → service green ──
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: green-host-route
spec:
  parentRefs:
    - name: main-gateway
  hostnames:
    - "green.danferreira.vip"
  rules:
    - backendRefs:
        - name: green
          port: 80
