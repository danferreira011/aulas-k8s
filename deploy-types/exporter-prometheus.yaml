apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: exporter-prometheus  
spec:
  selector:
    matchLabels:
      app: exporter-prometheus
  template:
    metadata:
      labels:
        app: exporter-prometheus
    spec:
      containers:
        - name: exporter-prometheus
          image: prom/node-exporter:v1.7.0
          ports:
            - containerPort: 9100
              protocol: TCP
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /rootfs
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /