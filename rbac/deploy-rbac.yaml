# Cria uma ServiceAccount chamada kube-board para autenticação de pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-board
---
# Define um ClusterRole com permissões totais (acesso a todos os recursos e verbos)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: full-access
rules:
  - apiGroups: [""] 
    resources: ["namespaces"]  
    verbs: ["get", "list"]
  # - apiGroups: ["apps"] 
  #   resources: ["deployments"]  
  #   verbs: ["get", "list"]     
---
# Define um Role no namespace 'default' que permite ao ServiceAccount 'kube-board' listar pods e deployments neste namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: full-access-role
  namespace: default
rules:
  - apiGroups: [""] 
    resources: ["pods"]  
    verbs: ["get", "list"]
  - apiGroups: ["apps"] 
    resources: ["deployments"]  
    verbs: ["get", "list"]
---
# Vincula o Role 'full-access-role' ao ServiceAccount 'kube-board' no namespace 'default'
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-board-rolebinding-default
  namespace: default
subjects:
- kind: ServiceAccount
  name: kube-board
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: full-access-role
---



# Define um Role no namespace 'kube-system' com as mesmas permissões (listar pods e deployments)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: full-access-role
  namespace: kube-system
rules:
  - apiGroups: [""] 
    resources: ["pods"]  
    verbs: ["get", "list"]
  - apiGroups: ["apps"] 
    resources: ["deployments"]  
    verbs: ["get", "list"]
---
# Vincula o Role 'full-access-role' do namespace 'kube-system' ao ServiceAccount 'kube-board' (que está no default)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-board-rolebinding-default
  namespace: kube-system
subjects:
- kind: ServiceAccount
  name: kube-board
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: full-access-role
---
# Vincula o ClusterRole 'full-access' ao ServiceAccount 'kube-board' no namespace default
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-board-rolebinding
subjects:
- kind: ServiceAccount
  name: kube-board
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: full-access
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-board
spec:
  selector:
    matchLabels:
      app: kube-board
  template:
    metadata:
      labels:
        app: kube-board
    spec:
      serviceAccountName: kube-board
      containers:
      - name: kube-board
        image: fabricioveronez/kube-board
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 3000
---
# service.yaml
apiVersion: v1
kind: Service
metadata:
  name: kube-board
spec:
  selector:
    app: kube-board
  ports:
  - port: 80
    nodePort: 30000
    targetPort: 3000
  type: NodePort