---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: db-pv-nfs
spec:
  capacity:
    storage: 4Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Delete
  storageClassName: nfs-static-storage
  nfs:
    server: 52.180.66.75
    path: /mnt/nfs_shared
  mountOptions:
    - nfsvers=4.2